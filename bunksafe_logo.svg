<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background Gradient (A vibrant, modern teal to deep blue) -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00c6ff"/>
      <stop offset="100%" stop-color="#0072ff"/>
    </linearGradient>

    <!-- White glow for the shield -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Base App Icon rounded square -->
  <rect width="512" height="512" rx="110" fill="url(#bg)" />

  <!-- Shield Shape (representing 'Safe' in BunkSafe) -->
  <path d="M 256 120 
           L 150 160 
           L 150 280 
           C 150 370 230 420 256 430 
           C 282 420 362 370 362 280 
           L 362 160 Z" 
        fill="#ffffff" filter="url(#glow)"/>

  <!-- Checkmark (representing Attendance/Success) built into a stylized 'B' -->
  <!-- Left stalk of the B -->
  <path d="M 210 200 L 210 340" 
        fill="none" stroke="#0083B0" stroke-width="36" stroke-linecap="round"/>
        
  <!-- Top loop of the B -->
  <path d="M 210 200 
           C 290 200 310 220 310 240 
           C 310 260 290 270 240 270" 
        fill="none" stroke="#0083B0" stroke-width="36" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Bottom loop formed as a checkmark -->
  <path d="M 220 270 
           C 290 270 320 290 320 315 
           L 260 360
           L 200 320" 
        fill="none" stroke="#0083B0" stroke-width="36" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
